<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Quiz VVF</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f3f0;color:#1a1a1a;min-height:100vh}
.page{display:none}.page.on{display:block}

/* HOME */
.hero{background:#b91c1c;padding:44px 20px 30px;text-align:center}
.hero-ico{font-size:52px}
.hero-h1{font-size:22px;font-weight:700;color:#fff;margin-top:8px}
.hero-sub{font-size:13px;color:rgba(255,255,255,.75);margin-top:3px}
.hero-src{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.home-body{padding:18px 14px;max-width:460px;margin:0 auto}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.icard{background:#fff;border-radius:13px;padding:14px 10px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.07)}
.icard-ico{font-size:20px}
.icard-val{font-size:17px;font-weight:700;margin-top:3px}
.icard-lab{font-size:11px;color:#6b7280;margin-top:1px}
.sec-label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.mat-list{display:flex;flex-direction:column;gap:7px;margin-bottom:20px}
.mat-row{display:flex;align-items:center;gap:10px;background:#fff;border-radius:10px;padding:10px 13px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.mat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.mat-nome{font-size:13px;font-weight:500;flex:1}
.mat-cnt{font-size:11px;color:#9ca3af}
.btn-main{width:100%;background:#b91c1c;color:#fff;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-main:active{opacity:.85}

/* QUIZ */
.qhdr{background:#b91c1c;padding:11px 14px 9px;position:sticky;top:0;z-index:10}
.qhdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.q-cnt{font-size:12px;color:rgba(255,255,255,.8)}
.q-timer{font-family:monospace;font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.15);padding:3px 9px;border-radius:20px;transition:color .3s}
.q-timer.ora{color:#fbbf24}.q-timer.red{color:#ff8080}
.prog-bg{background:rgba(255,255,255,.2);border-radius:4px;height:3px}
.prog-bar{background:#fff;border-radius:4px;height:3px;transition:width .4s}
.qbody{padding:14px 14px 28px;max-width:460px;margin:0 auto}
.qbadge-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.mat-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.pt-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:#dcfce7;color:#15803d}
.q-testo{font-size:16px;font-weight:500;line-height:1.55;margin-bottom:16px;color:#1a1a1a}
.opt-list{display:flex;flex-direction:column;gap:9px;margin-bottom:13px}
.opt-btn{display:flex;align-items:flex-start;gap:10px;background:#fff;border:1.5px solid #e5e7eb;border-radius:13px;padding:12px;cursor:pointer;text-align:left;width:100%;font-family:inherit;transition:border-color .15s,background .15s}
.opt-btn:active{opacity:.8}
.opt-btn.ok{background:#dcfce7;border-color:#15803d}
.opt-btn.err{background:#fee2e2;border-color:#b91c1c}
.opt-let{width:26px;height:26px;border-radius:50%;border:1.5px solid #e5e7eb;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#9ca3af;flex-shrink:0;margin-top:1px;transition:all .15s}
.opt-btn.ok .opt-let{background:#15803d;border-color:#15803d;color:#fff}
.opt-btn.err .opt-let{background:#b91c1c;border-color:#b91c1c;color:#fff}
.opt-txt{font-size:14px;color:#1a1a1a;line-height:1.4;flex:1;padding-top:3px}
.opt-ico{font-size:16px;flex-shrink:0;padding-top:3px}
.btn-avanti{width:100%;background:#b91c1c;color:#fff;border:none;border-radius:13px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:none}
.btn-avanti.on{display:block}
.btn-avanti:active{opacity:.85}

/* RISULTATI */
.res-hero{background:#b91c1c;padding:30px 20px 22px;text-align:center}
.res-ico{font-size:52px}
.res-score{font-size:42px;font-weight:700;color:#fff;line-height:1;margin-top:6px}
.res-perc{font-size:17px;color:rgba(255,255,255,.72);margin-top:3px}
.res-msg{font-size:13px;color:rgba(255,255,255,.82);margin-top:8px}
.res-body{padding:18px 14px 32px;max-width:460px;margin:0 auto}
.mat-res{background:#fff;border-radius:13px;padding:13px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.mat-res-hdr{display:flex;justify-content:space-between;margin-bottom:7px}
.mat-res-nome{font-size:13px;font-weight:500}
.mat-res-pt{font-size:12px;font-weight:700}
.bar-bg{background:#e5e7eb;border-radius:4px;height:5px}
.bar-fill{border-radius:4px;height:5px;transition:width .8s}

/* ERRORI */
.errori-sezione{margin-top:18px}
.errori-titolo{font-size:12px;font-weight:700;color:#b91c1c;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.errore-card{background:#fff;border-radius:13px;padding:13px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);border-left:3px solid #b91c1c}
.errore-num{font-size:10px;font-weight:700;color:#b91c1c;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.errore-domanda{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:8px;line-height:1.4}
.errore-row{display:flex;align-items:flex-start;gap:7px;margin-bottom:4px}
.errore-row:last-child{margin-bottom:0}
.errore-label{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0;margin-top:1px}
.label-data{background:#fee2e2;color:#b91c1c}
.label-ok{background:#dcfce7;color:#15803d}
.errore-testo{font-size:12px;color:#374151;line-height:1.4}

/* WHATSAPP BTN */
.btn-wa{width:100%;background:#25D366;color:#fff;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-wa:active{opacity:.85}
.btn-wa svg{width:20px;height:20px;fill:#fff;flex-shrink:0}
.btn-ricomincia{width:100%;background:#b91c1c;color:#fff;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:10px}
.btn-ricomincia:active{opacity:.85}

/* TOGGLE errori */
.toggle-errori{width:100%;background:#fff;color:#b91c1c;border:1.5px solid #b91c1c;border-radius:13px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:6px}
.toggle-errori:active{opacity:.8}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="page on">
  <div class="hero">
    <div class="hero-ico">🚒</div>
    <div class="hero-h1">Quiz VVF</div>
    <div class="hero-sub">Simulatore Concorso 350 posti 2024</div>
    <div class="hero-src">Banca dati ufficiale · mininterno.net</div>
  </div>
  <div class="home-body">
    <div class="grid2">
      <div class="icard"><div class="icard-ico">📋</div><div class="icard-val">40</div><div class="icard-lab">Domande</div></div>
      <div class="icard"><div class="icard-ico">⏱️</div><div class="icard-val">40 min</div><div class="icard-lab">Tempo</div></div>
      <div class="icard"><div class="icard-ico">🔘</div><div class="icard-val">4</div><div class="icard-lab">Opzioni</div></div>
      <div class="icard"><div class="icard-ico">🏅</div><div class="icard-val">10×</div><div class="icard-lab">Ammessi</div></div>
    </div>
    <div class="sec-label">Materie</div>
    <div class="mat-list" id="mat-list"></div>
    <button class="btn-main" onclick="avviaQuiz()">▶ Inizia simulazione</button>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="page">
  <div class="qhdr">
    <div class="qhdr-row">
      <span class="q-cnt" id="q-cnt">Dom. 1/40</span>
      <span class="q-timer" id="q-timer">40:00</span>
    </div>
    <div class="prog-bg"><div class="prog-bar" id="prog-bar" style="width:2.5%"></div></div>
  </div>
  <div class="qbody">
    <div class="qbadge-row">
      <span class="mat-badge" id="mat-badge"></span>
      <span class="pt-badge" id="pt-badge">✅ 0</span>
    </div>
    <div class="q-testo" id="q-testo"></div>
    <div class="opt-list" id="opt-list"></div>
    <button class="btn-avanti" id="btn-avanti" onclick="avanti()">Prossima domanda →</button>
  </div>
</div>

<!-- RISULTATI -->
<div id="risultati" class="page">
  <div class="res-hero">
    <div class="res-ico" id="res-ico"></div>
    <div class="res-score" id="res-score"></div>
    <div class="res-perc" id="res-perc"></div>
    <div class="res-msg" id="res-msg"></div>
  </div>
  <div class="res-body">
    <div class="sec-label" style="margin-bottom:12px">Per materia</div>
    <div id="res-materie"></div>

    <!-- Bottone WhatsApp -->
    <button class="btn-wa" onclick="condividiWhatsApp()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.528 5.858L.057 23.625a.75.75 0 0 0 .918.919l5.857-1.47A11.95 11.95 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.891 0-3.667-.523-5.188-1.432l-.372-.223-3.876.972.989-3.784-.245-.389A9.96 9.96 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
      Invia risultato su WhatsApp
    </button>

    <!-- Toggle errori -->
    <button class="toggle-errori" onclick="toggleErrori()" id="btn-toggle-errori">
      ❌ Mostra risposte sbagliate
    </button>

    <!-- Sezione errori (nascosta di default) -->
    <div class="errori-sezione" id="errori-sezione" style="display:none">
      <div class="errori-titolo">❌ Risposte sbagliate</div>
      <div id="errori-lista"></div>
    </div>

    <button class="btn-ricomincia" onclick="ricomincia()">↻ Nuovo Quiz</button>
  </div>
</div>

var LETTERE=["A","B","C","D"];
var sessione=[],idx=0,pt=0,risposte={},timerID=null,sec=2400,selezionata=null;
var erroriMostrati=false;

function shuffle(a){
  var b=[].concat(a);
  for(var i=b.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=b[i];b[i]=b[j];b[j]=t;
  }
  return b;
}
function filtra(m){return BANCA.filter(function(d){return d.m===m;});}
function costruisci(){
  var target={storia:8,logica:8,chimica:6,fisica:6,informatica:6,inglese:6};
  var pool=[];
  for(var mat in target){pool=pool.concat(shuffle(filtra(mat)).slice(0,target[mat]));}
  return shuffle(pool);
}
function mostra(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
}

// HOME init
(function(){
  var cnt={};
  BANCA.forEach(function(d){cnt[d.m]=(cnt[d.m]||0)+1;});
  var html='';
  for(var k in MATERIE){
    var m=MATERIE[k];
    html+='<div class="mat-row">'
      +'<div class="mat-dot" style="background:'+m.dot+'"></div>'
      +'<div class="mat-nome">'+m.nome+'</div>'
      +'<div class="mat-cnt">'+(cnt[k]||0)+' quesiti</div>'
      +'</div>';
  }
  document.getElementById('mat-list').innerHTML=html;
})();

function avviaQuiz(){
  sessione=costruisci();
  idx=0;pt=0;risposte={};selezionata=null;sec=2400;
  erroriMostrati=false;
  mostra('quiz');
  renderDomanda();
  clearInterval(timerID);
  timerID=setInterval(function(){
    sec--;
    var m=String(Math.floor(sec/60)).padStart(2,'0');
    var s=String(sec%60).padStart(2,'0');
    var el=document.getElementById('q-timer');
    el.textContent=m+':'+s;
    el.className='q-timer'+(sec<=300?' red':sec<=600?' ora':'');
    if(sec<=0){clearInterval(timerID);mostraRisultati();}
  },1000);
}

function renderDomanda(){
  var d=sessione[idx];
  var mat=MATERIE[d.m];
  selezionata=null;
  document.getElementById('q-cnt').textContent='Dom. '+(idx+1)+'/'+sessione.length;
  document.getElementById('prog-bar').style.width=(((idx+1)/sessione.length)*100)+'%';
  var badge=document.getElementById('mat-badge');
  badge.textContent=mat.nome;
  badge.style.background=mat.sfondo;
  badge.style.color=mat.colore;
  document.getElementById('pt-badge').textContent='Corrette: '+pt;
  document.getElementById('q-testo').textContent=d.t;
  var html='';
  for(var i=0;i<4;i++){
    html+='<button class="opt-btn" onclick="seleziona('+i+')" id="opt'+i+'">'
      +'<div class="opt-let" id="let'+i+'">'+LETTERE[i]+'</div>'
      +'<div class="opt-txt">'+d.o[i]+'</div>'
      +'<div class="opt-ico" id="ico'+i+'"></div>'
      +'</button>';
  }
  document.getElementById('opt-list').innerHTML=html;
  var btn=document.getElementById('btn-avanti');
  btn.classList.remove('on');
  btn.textContent=idx<sessione.length-1?'Prossima domanda →':'Vedi risultati →';
}

function seleziona(i){
  if(selezionata!==null)return;
  selezionata=i;
  risposte[idx]=i;
  var d=sessione[idx];
  if(i===d.r)pt++;
  for(var j=0;j<4;j++){
    var btn=document.getElementById('opt'+j);
    btn.disabled=true;
    if(j===d.r){btn.classList.add('ok');document.getElementById('ico'+j).textContent='✅';}
    else if(j===i){btn.classList.add('err');document.getElementById('ico'+j).textContent='❌';}
  }
  document.getElementById('pt-badge').textContent='Corrette: '+pt;
  document.getElementById('btn-avanti').classList.add('on');
}

function avanti(){
  if(idx<sessione.length-1){idx++;renderDomanda();}
  else{clearInterval(timerID);mostraRisultati();}
}

function mostraRisultati(){
  mostra('risultati');
  var tot=sessione.length;
  var perc=Math.round(pt/tot*100);
  var emoji=perc>=85?'🏆':perc>=70?'🎉':perc>=60?'✅':'📚';
  var msg=perc>=85?'Eccellente! Sei pronto per il concorso.':
          perc>=70?'Buon risultato, continua così.':
          perc>=60?'Sufficiente. Ripassia i punti deboli.':
          'Da migliorare. Studia ancora!';
  document.getElementById('res-ico').textContent=emoji;
  document.getElementById('res-score').textContent=pt+' / '+tot;
  document.getElementById('res-perc').textContent=perc+'%';
  document.getElementById('res-msg').textContent=msg;

  // Materie
  var html='';
  for(var k in MATERIE){
    var mat=MATERIE[k];
    var dm=sessione.filter(function(d){return d.m===k;});
    if(!dm.length)continue;
    var ok=0;
    for(var i=0;i<dm.length;i++){
      var gi=sessione.indexOf(dm[i]);
      if(risposte[gi]===dm[i].r)ok++;
    }
    var p=Math.round(ok/dm.length*100);
    html+='<div class="mat-res">'
      +'<div class="mat-res-hdr">'
      +'<span class="mat-res-nome" style="color:'+mat.colore+'">'+mat.nome+'</span>'
      +'<span class="mat-res-pt" style="color:'+mat.colore+'">'+ok+'/'+dm.length+'</span>'
      +'</div>'
      +'<div class="bar-bg"><div class="bar-fill" style="width:'+p+'%;background:'+mat.dot+'"></div></div>'
      +'</div>';
  }
  document.getElementById('res-materie').innerHTML=html;

  // Prepara lista errori (nascosta)
  var errHtml='';
  var numErrore=0;
  for(var i=0;i<sessione.length;i++){
    var d=sessione[i];
    var datorisposta=risposte[i];
    if(datorisposta===undefined||datorisposta!==d.r){
      numErrore++;
      var datatoTesto=datorisposta!==undefined?d.o[datorisposta]:'Non risposta';
      errHtml+='<div class="errore-card">'
        +'<div class="errore-num">Domanda '+(i+1)+' — '+MATERIE[d.m].nome+'</div>'
        +'<div class="errore-domanda">'+d.t+'</div>'
        +'<div class="errore-row">'
        +'<span class="errore-label label-data">Hai risposto</span>'
        +'<span class="errore-testo">'+datatoTesto+'</span>'
        +'</div>'
        +'<div class="errore-row">'
        +'<span class="errore-label label-ok">Corretta</span>'
        +'<span class="errore-testo">'+d.o[d.r]+'</span>'
        +'</div>'
        +'</div>';
    }
  }
  document.getElementById('errori-lista').innerHTML=errHtml||'<p style="font-size:13px;color:#6b7280;padding:8px 0">Nessun errore! Perfetto 🎉</p>';

  // Aggiorna testo bottone toggle
  var btnToggle=document.getElementById('btn-toggle-errori');
  btnToggle.textContent='❌ Mostra risposte sbagliate ('+numErrore+')';
  erroriMostrati=false;
  document.getElementById('errori-sezione').style.display='none';
}

function toggleErrori(){
  erroriMostrati=!erroriMostrati;
  var sezione=document.getElementById('errori-sezione');
  var btn=document.getElementById('btn-toggle-errori');
  sezione.style.display=erroriMostrati?'block':'none';
  // conta errori
  var n=0;
  for(var i=0;i<sessione.length;i++){
    if(risposte[i]===undefined||risposte[i]!==sessione[i].r)n++;
  }
  btn.textContent=erroriMostrati?'▲ Nascondi risposte sbagliate':'❌ Mostra risposte sbagliate ('+n+')';
  if(erroriMostrati){
    setTimeout(function(){
      document.getElementById('errori-sezione').scrollIntoView({behavior:'smooth'});
    },100);
  }
}

function condividiWhatsApp(){
  var tot=sessione.length;
  var perc=Math.round(pt/tot*100);
  var emoji=perc>=85?'🏆':perc>=70?'🎉':perc>=60?'✅':'📚';

  // Conta errori per materia
  var riepilogo='';
  for(var k in MATERIE){
    var dm=sessione.filter(function(d){return d.m===k;});
    if(!dm.length)continue;
    var ok=0;
    for(var i=0;i<dm.length;i++){
      var gi=sessione.indexOf(dm[i]);
      if(risposte[gi]===dm[i].r)ok++;
    }
    riepilogo+='\n• '+MATERIE[k].nome+': '+ok+'/'+dm.length;
  }

  // Lista errori
  var erroriTesto='';
  var numE=0;
  for(var i=0;i<sessione.length;i++){
    var d=sessione[i];
    if(risposte[i]===undefined||risposte[i]!==d.r){
      numE++;
      if(numE<=10){ // max 10 errori nel messaggio per non essere troppo lungo
        erroriTesto+='\n'+(i+1)+'. '+d.t+'\n   ✅ '+d.o[d.r];
      }
    }
  }
  if(numE>10)erroriTesto+='\n...e altri '+(numE-10)+' errori';

  var testo=emoji+' *Quiz VVF — Risultato*\n\n'
    +'Punteggio: *'+pt+' / '+tot+'* ('+perc+'%)\n\n'
    +'*Per materia:*'+riepilogo+'\n\n';

  if(numE>0){
    testo+='*Risposte sbagliate ('+numE+'):*'+erroriTesto+'\n\n';
  } else {
    testo+='Nessun errore! Prestazione perfetta! 🎉\n\n';
  }
  testo+='_Simulatore Concorso 350 VVF 2024_';

  var url='https://wa.me/?text='+encodeURIComponent(testo);
  window.open(url,'_blank');
}

function ricomincia(){mostra('home');}
</script>
